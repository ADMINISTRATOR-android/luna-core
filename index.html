<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA UI | CORE MATRIX V4.0</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-glow: rgba(0, 243, 255, 0.25);
            --matrix-dark: #020b14;
            --panel-bg: rgba(6, 26, 44, 0.45);
            --border-glow: rgba(0, 243, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--matrix-dark); color: #79c5e4;
            font-family: 'Segoe UI', Monaco, 'Courier New', monospace;
            display: grid; grid-template-rows: auto 1fr auto;
            height: 100vh; overflow: hidden; padding: 15px; position: relative;
        }

        /* Ambient Grid */
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1; pointer-events: none;
        }

        header { 
            grid-row: 1; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            border: 1px solid var(--border-glow); background: var(--panel-bg);
            backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 6px;
            font-size: 11px; letter-spacing: 2px; z-index: 5;
        }

        /* Swarm Container */
        .stage {
            grid-row: 2; position: relative; display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; z-index: 2;
        }

        #particleCanvas { position: absolute; z-index: 1; }

        .orb-wrapper { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }

        .jarvis-orb {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, rgba(2,24,43,1) 0%, rgba(5,42,69,0.4) 70%);
            border: 2px solid var(--neon-blue); position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3); z-index: 10; cursor: pointer;
        }

        #orbLabel { font-size: 9px; font-weight: bold; letter-spacing: 2px; color: var(--neon-blue); }

        /* HUD Footer */
        footer { grid-row: 3; display: flex; flex-direction: column; gap: 10px; z-index: 5; margin-top: 15px; }
        .display-deck {
            width: 100%; background: var(--panel-bg); border: 1px solid var(--border-glow);
            padding: 15px; border-radius: 6px; min-height: 80px; overflow-y: auto;
        }
        .input-bar { display: flex; width: 100%; background: rgba(3, 15, 27, 0.9); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 4px; }
        input { flex: 1; background: transparent; border: none; outline: none; color: #fff; padding: 14px; font-family: inherit; }
        button { background: rgba(0, 243, 255, 0.1); border: none; color: var(--neon-blue); padding: 0 22px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; color: var(--neon-blue);">LUNA MATRIX V4.0</div>
        <div style="color: #00ffaa;">CORE ONLINE</div>
        <div style="text-align: right; cursor: pointer;">// ARCHIVE</div>
    </header>

    <div class="stage">
        <canvas id="particleCanvas"></canvas>
        <div class="orb-wrapper">
            <div id="lunaOrbCore" class="jarvis-orb">
                <span id="orbLabel">READY</span>
            </div>
        </div>
    </div>

    <footer>
        <div class="display-deck" id="displayDeck">Luna: "Systems initialized. Swarm matrix active."</div>
        <div class="input-bar">
            <input type="text" id="matrixInput" placeholder="Command...">
            <button id="sendBtn">TRANSMIT</button>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const orb = document.getElementById('lunaOrbCore');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const dots = [];
        for (let i = 0; i < 100; i++) {
            dots.push({
                angle: Math.random() * Math.PI * 2,
                speed: (Math.random() - 0.5) * 0.04, 
                radius: 120 + Math.random() * 100
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(2, 8, 19, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            dots.forEach(dot => {
                dot.angle += dot.speed;
                const x = centerX + Math.cos(dot.angle) * dot.radius;
                const y = centerY + Math.sin(dot.angle) * dot.radius;

                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#00f3ff';
                ctx.fill();
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#00f3ff';
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Basic interactivity
        orb.onclick = () => {
            orb.style.borderColor = '#ff2a6d';
            document.getElementById('orbLabel').innerText = "LISTENING";
            setTimeout(() => {
                orb.style.borderColor = 'var(--neon-blue)';
                document.getElementById('orbLabel').innerText = "READY";
            }, 3000);
        };
    </script>
</body>
</html>
