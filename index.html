<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA — STARDUST REGEN MATRIX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #01060f;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #52b3d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 24px;
            overflow: hidden;
        }
        .sys-header {
            width: 100%; display: flex; justify-content: space-between;
            font-size: 11px; letter-spacing: 2px;
            border: 1px solid rgba(82, 179, 217, 0.15);
            padding: 12px 16px; background: rgba(2, 12, 27, 0.7);
        }
        .sys-status { color: #00f3ff; text-shadow: 0 0 8px rgba(0, 243, 255, 0.5); }
        .core-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .matrix-ring {
            width: 180px; height: 180px; border-radius: 50%;
            border: 1px dashed rgba(0, 243, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            animation: spin 20s linear infinite;
        }
        .matrix-ring-inner {
            width: 140px; height: 140px; border-radius: 50%;
            border: 2px solid rgba(0, 243, 255, 0.6);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            display: flex; align-items: center; justify-content: center;
        }
        .core-state { font-size: 13px; letter-spacing: 3px; color: #00f3ff; font-weight: bold; }
        .matrix-ring.processing { border-color: #ff3366; }
        .matrix-ring.processing .matrix-ring-inner { border-color: #ff3366; box-shadow: 0 0 40px rgba(255, 51, 102, 0.4); }
        .matrix-ring.processing .core-state { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.8); }
        .display-panel {
            width: 100%; max-width: 600px; min-height: 110px;
            background: rgba(2, 12, 27, 0.8); border: 1px solid rgba(82, 179, 217, 0.25);
            padding: 18px; font-size: 13px; line-height: 1.6; color: #7be5ff; margin-bottom: 16px;
        }
        .control-deck { width: 100%; max-width: 600px; display: flex; gap: 12px; margin-bottom: 14px; }
        .matrix-input {
            flex: 1; background: rgba(1, 10, 22, 0.9); border: 1px solid rgba(82, 179, 217, 0.4);
            color: #ffffff; padding: 14px 16px; font-family: monospace; font-size: 13px; outline: none;
        }
        .transfuse-btn {
            background: rgba(2, 24, 43, 0.8); border: 1px solid #52b3d9; color: #52b3d9;
            padding: 0 28px; font-weight: bold; cursor: pointer;
        }
        .matrix-link-btn {
            width: 100%; max-width: 600px; background: transparent;
            border: 1px dashed rgba(82, 179, 217, 0.3); color: #52b3d9;
            padding: 12px; font-size: 11px; letter-spacing: 3px; cursor: pointer;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="sys-header">
        <div>LUNA STARDUST CORE V6.5</div>
        <div class="sys-status">● NEBULA_STABLE</div>
        <div>// SYS_MEMORY_LOGS</div>
    </div>

    <div class="core-container">
        <div id="ringContainer" class="matrix-ring">
            <div class="matrix-ring-inner">
                <div id="coreStatusText" class="core-state">STABLE</div>
            </div>
        </div>
    </div>

    <div id="displayPanel" class="display-panel">
        Luna System Online. Connection paths stabilized.
    </div>

    <div class="control-deck">
        <input type="text" id="keyboardInput" class="matrix-input" placeholder="Inject cloud parameter comm..." autocomplete="off">
        <button id="sendTextBtn" class="transfuse-btn">TRANSFUSE</button>
    </div>

    <button id="audioMatrixBtn" class="matrix-link-btn">CONNECT AUDIO MATRIX LINK</button>

    <script>
        let audioContextInitialized = false;

        async function initAudioMatrix() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                audioContextInitialized = true;
                const btn = document.getElementById('audioMatrixBtn');
                btn.innerText = "AUDIO MATRIX LINK ACTIVE";
                btn.style.borderColor = "#00f3ff";
                btn.style.color = "#00f3ff";
            }
        }

        async function runMatrixTransfusion() {
            const inputElement = document.getElementById('keyboardInput');
            const userText = inputElement.value.trim();
            const ring = document.getElementById('ringContainer');
            const coreText = document.getElementById('coreStatusText');
            const consoleDisplay = document.getElementById('displayPanel');

            if (!userText) return;

            ring.classList.add('processing');
            coreText.innerText = "THINKING";
            inputElement.value = ""; 

            try {
                // Phase 1: Run Chat Completion Pipeline
                const chatResponse = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: "user", content: userText }] })
                });
                
                const chatData = await chatResponse.json();
                if (!chatResponse.ok) throw new Error(chatData.error || `HTTP ${chatResponse.status}`);
                
                const lunaReply = chatData.luna_text;
                consoleDisplay.innerText = "Luna: " + lunaReply;
                coreText.innerText = "VOCALIZING";

                // Phase 2: Stream Live Audio directly from Cartesia Matrix via Backend
                const audioResponse = await fetch('/tts/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: lunaReply })
                });

                if (!audioResponse.ok) {
                    const audioErrData = await audioResponse.json().catch(() => ({}));
                    throw new Error(audioErrData.error || "TTS Stream dropped.");
                }

                const audioBlob = await audioResponse.blob();
                const matrixAudioPlayer = new Audio(URL.createObjectURL(audioBlob));
                
                matrixAudioPlayer.onended = () => { 
                    ring.classList.remove('processing'); 
                    coreText.innerText = "STABLE"; 
                };
                
                await matrixAudioPlayer.play();

            } catch (matrixException) {
                console.error(matrixException);
                consoleDisplay.innerText = "SYSTEM FAULT: " + matrixException.message;
                ring.classList.remove('processing');
                coreText.innerText = "ERROR";
            }
        }

        // Connect Interactive Directives
        document.getElementById('sendTextBtn').onclick = runMatrixTransfusion;
        document.getElementById('audioMatrixBtn').onclick = initAudioMatrix;
        
        document.getElementById('keyboardInput').onkeypress = function(e) { 
            if (e.key === 'Enter') {
                runMatrixTransfusion(); 
            }
        };
    </script>
</body>
</html>
