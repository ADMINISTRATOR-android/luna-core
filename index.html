<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA — SYSTEMS INTELLIGENCE V4.0</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-glow: rgba(0, 243, 255, 0.25);
            --matrix-dark: #020b14;
            --panel-bg: rgba(6, 26, 44, 0.45);
            --border-glow: rgba(0, 243, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--matrix-dark);
            color: #79c5e4;
            font-family: 'Segoe UI', Monaco, 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 15px;
            position: relative;
        }

        /* Sci-fi Background Grid Grid */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            pointer-events: none;
        }

        /* Top Header Telemetry */
        .hud-header {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border: 1px solid var(--border-glow);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 11px;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            z-index: 5;
        }

        .sys-title { font-weight: 800; color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-glow); }
        .sys-status { text-align: center; color: #00ffaa; display: flex; align-items: center; gap: 6px; justify-content: center; }
        .pulse-dot { width: 6px; height: 6px; background: #00ffaa; border-radius: 50%; animation: heartBeat 1.5s infinite; }
        .history-trigger { text-align: right; color: #79c5e4; cursor: pointer; text-decoration: none; font-weight: bold; transition: color 0.2s; }
        .history-trigger:hover { color: var(--neon-blue); }

        /* Left/Right Telemetry Panels (Desktop visible, clean layout) */
        .hud-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            z-index: 2;
        }

        /* Center Holographic Orb Core */
        .orb-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 240px;
            height: 240px;
            margin: auto;
        }

        .jarvis-orb {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(2,24,43,1) 0%, rgba(5,42,69,0.4) 70%, rgba(0,243,255,0.02) 100%);
            border: 2px dashed rgba(0, 243, 255, 0.4);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* Ring Architecture */
        .orb-ring-1 { position: absolute; width: 220px; height: 220px; border-radius: 50%; border: 1px double rgba(0, 243, 255, 0.2); animation: rotateClockwise 15s linear infinite; }
        .orb-ring-2 { position: absolute; width: 240px; height: 240px; border-radius: 50%; border: 1px dashed rgba(0, 255, 170, 0.15); animation: rotateCounterClockwise 25s linear infinite; }

        .jarvis-orb::before {
            content: ''; position: absolute; width: 150px; height: 150px; border-radius: 50%;
            border: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            animation: rotateClockwise 8s linear infinite;
        }

        .jarvis-orb::after {
            content: ''; position: absolute; width: 90px; height: 90px; border-radius: 50%;
            border: 1px solid #00ffaa; box-shadow: inset 0 0 15px rgba(0, 255, 170, 0.2);
            animation: orbPulse 2s ease-in-out infinite;
        }

        /* Dynamic Orb Action Matrices */
        .jarvis-orb.listening { border-color: #00ffaa; box-shadow: 0 0 50px rgba(0, 255, 170, 0.4); transform: scale(1.03); }
        .jarvis-orb.listening::before { border-color: #00ffaa; animation-duration: 3s; }
        .jarvis-orb.thinking { border-color: #ffaa00; box-shadow: 0 0 50px rgba(255, 170, 0, 0.3); }
        .jarvis-orb.speaking { border-color: #ff2a6d; box-shadow: 0 0 50px rgba(255, 42, 109, 0.5); transform: scale(1.05); }
        .jarvis-orb.speaking::before { border-color: #ff2a6d; animation-duration: 2s; }

        #orbLabel { font-size: 9px; font-weight: bold; letter-spacing: 2px; color: var(--neon-blue); z-index: 10; margin-top: 5px; text-shadow: 0 0 5px rgba(0,243,255,0.5); }

        /* Tactical Terminal Log Display */
        .display-deck {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            padding: 15px;
            min-height: 100px;
            max-height: 140px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            margin-bottom: 15px;
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.05);
        }

        .terminal-row { font-size: 13px; line-height: 1.6; text-align: center; }
        .user-node { color: #ffffff; font-weight: bold; margin-bottom: 4px; }
        .luna-node { color: var(--neon-blue); font-weight: bold; text-shadow: 0 0 8px rgba(0,243,255,0.3); }

        /* Control Input Center */
        .hud-footer { width: 100%; display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        
        .input-bar-container {
            display: flex;
            width: 100%;
            background: rgba(3, 15, 27, 0.9);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }
        .input-bar-container:focus-within { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-glow); }
        
        .matrix-input {
            flex: 1; background: transparent; border: none; outline: none;
            color: #ffffff; padding: 14px; font-family: inherit; font-size: 14px; letter-spacing: 0.5px;
        }
        
        .matrix-send-btn {
            background: rgba(0, 243, 255, 0.1); border: none;
            border-left: 1px solid rgba(0, 243, 255, 0.3); color: var(--neon-blue);
            padding: 0 22px; cursor: pointer; font-family: inherit; font-weight: bold; letter-spacing: 1px; transition: all 0.2s;
        }
        .matrix-send-btn:hover { background: var(--neon-blue); color: var(--matrix-dark); }

        .coupling-btn {
            background: transparent; border: 1px dashed rgba(0, 243, 255, 0.4);
            color: var(--neon-blue); padding: 12px; font-size: 11px; font-family: inherit;
            letter-spacing: 3px; text-transform: uppercase; border-radius: 4px; cursor: pointer;
            width: 100%; text-align: center; transition: all 0.2s;
        }
        .coupling-btn:hover { background: rgba(0, 243, 255, 0.05); border-style: solid; }

        /* Sliding Data Drawer Overlay */
        .memory-drawer {
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: rgba(2, 9, 16, 0.98); border-right: 1px solid var(--neon-blue);
            z-index: 20; transition: left 0.4s cubic-bezier(0.075, 0.82, 0.165, 1);
            padding: 25px; display: flex; flex-direction: column; backdrop-filter: blur(15px);
        }
        .memory-drawer.open { left: 0; }
        
        .drawer-hud { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 243, 255, 0.2); padding-bottom: 15px; margin-bottom: 20px; }
        .drawer-title { font-weight: bold; letter-spacing: 2px; color: var(--neon-blue); }
        .drawer-close { color: #ff2a6d; font-weight: bold; cursor: pointer; font-size: 12px; letter-spacing: 1px; }
        
        .log-stream { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .log-card { font-size: 12px; padding: 12px; border-radius: 4px; line-height: 1.5; background: rgba(255,255,255,0.01); border: 1px solid rgba(0, 243, 255, 0.08); }
        .log-user { border-left: 3px solid #ffffff; color: #ffffff; }
        .log-luna { border-left: 3px solid var(--neon-blue); color: var(--neon-blue); }
        
        .purge-btn { background: rgba(255, 42, 109, 0.05); border: 1px dashed #ff2a6d; color: #ff2a6d; padding: 12px; font-family: inherit; font-size: 11px; border-radius: 4px; cursor: pointer; margin-top: 15px; letter-spacing: 1px; }

        /* Animations Framework */
        @keyframes rotateClockwise { 100% { transform: rotate(360deg); } }
        @keyframes rotateCounterClockwise { 100% { transform: rotate(-360deg); } }
        @keyframes orbPulse { 0%, 100% { transform: scale(0.93); opacity: 0.4; } 50% { transform: scale(1.04); opacity: 0.9; } }
        @keyframes heartBeat { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="hud-header">
        <div class="sys-title">LUNA MATRIX V4.0</div>
        <div class="sys-status"><div class="pulse-dot"></div>CORE ONLINE</div>
        <div class="history-trigger" id="openLogBtn">// OPEN LOG ARCHIVE</div>
    </div>

    <div id="memoryDrawer" class="memory-drawer">
        <div class="drawer-hud">
            <span class="drawer-title">CORE_SYS_MEMORY.LOG</span>
            <span class="drawer-close" id="closeLogBtn">[TERMINATE CACHE]</span>
        </div>
        <div id="logStream" class="log-stream"></div>
        <button id="purgeCacheBtn" class="purge-btn">WIPE ALL SECURE MEMORY BANKS</button>
    </div>

    <div class="hud-container">
        <div class="orb-wrapper">
            <div class="orb-ring-1"></div>
            <div class="orb-ring-2"></div>
            <div id="lunaOrbCore" class="jarvis-orb">
                <span id="orbLabel">READY</span>
            </div>
        </div>
    </div>

    <div id="displayDeck" class="display-deck">
        <div class="terminal-row luna-node">Luna: "Systems recalibrated, Ayush. standing by for voice input parameters."</div>
    </div>

    <div class="hud-footer">
        <div class="input-bar-container">
            <input type="text" id="matrixInput" class="matrix-input" placeholder="Input string command sequence..." autocomplete="off">
            <button id="sendBtn" class="matrix-send-btn">TRANSMIT</button>
        </div>
        <button id="micBtn" class="coupling-btn">ENGAGE MIC COUPLING MATRIX</button>
    </div>

    <script>
        const RENDER_BACKEND_URL = "/v1/chat/completions";
        const speechSynthesizer = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let speechRecognizer = SpeechRecognition ? new SpeechRecognition() : null;
        
        if(speechRecognizer) { 
            speechRecognizer.continuous = false; 
            speechRecognizer.interimResults = false; 
            // Seamlessly accepts both English and Hindi input dynamically
            speechRecognizer.lang = 'en-US'; 
        }

        const lunaOrbCore = document.getElementById('lunaOrbCore');
        const orbLabel = document.getElementById('orbLabel');
        const displayDeck = document.getElementById('displayDeck');
        const micBtn = document.getElementById('micBtn');
        const matrixInput = document.getElementById('matrixInput');
        const sendBtn = document.getElementById('sendBtn');
        const memoryDrawer = document.getElementById('memoryDrawer');
        const openLogBtn = document.getElementById('openLogBtn');
        const logStream = document.getElementById('logStream');
        const purgeCacheBtn = document.getElementById('purgeCacheBtn');

        let interactionHistory = JSON.parse(localStorage.getItem('luna_v40_cache')) || [];
        refreshLogPanel();

        openLogBtn.addEventListener('click', () => { refreshLogPanel(); memoryDrawer.classList.add('open'); });
        document.getElementById('closeLogBtn').addEventListener('click', () => memoryDrawer.classList.remove('open'));
        sendBtn.addEventListener('click', processTextTransmission);
        matrixInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') processTextTransmission(); });

        async function processTextTransmission() {
            const currentString = matrixInput.value.trim();
            if(!currentString) return;
            matrixInput.value = "";
            displayDeck.innerHTML = `<div class="terminal-row user-node">Ayush: "${currentString}"</div>`;
            interactionHistory.push({ role: "user", content: currentString });
            commitCacheToMemory();
            await broadcastToLunaMatrix(currentString);
        }

        const triggerMicCoupling = () => { 
            if (!speechRecognizer) { alert("Mic framework link down."); return; } 
            speechSynthesizer.cancel(); 
            speechRecognizer.start(); 
        };
        lunaOrbCore.addEventListener('click', triggerMicCoupling);
        micBtn.addEventListener('click', triggerMicCoupling);

        if(speechRecognizer) {
            speechRecognizer.onstart = () => { lunaOrbCore.className = "jarvis-orb listening"; orbLabel.innerText = "LISTENING"; };
            speechRecognizer.onresult = async (event) => {
                const speechResultText = event.results[0][0].transcript;
                displayDeck.innerHTML = `<div class="terminal-row user-node">Ayush: "${speechResultText}"</div>`;
                interactionHistory.push({ role: "user", content: speechResultText });
                commitCacheToMemory();
                await broadcastToLunaMatrix(speechResultText);
            };
            speechRecognizer.onend = () => { if (!lunaOrbCore.classList.contains('speaking')) restoreOrbDefault(); };
        }

        async function broadcastToLunaMatrix(textPayload) {
            lunaOrbCore.className = "jarvis-orb thinking";
            orbLabel.innerText = "THINKING";
            try {
                const condensedContext = interactionHistory.slice(-20).map(msg => ({ role: msg.role, content: msg.content }));
                
                const matrixResponse = await fetch(RENDER_BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "luna-genesis-v4", messages: condensedContext, stream: false })
                });

                const dataPackage = await matrixResponse.json();
                const cleanReplyText = dataPackage.luna_text;

                displayDeck.innerHTML = `<div class="terminal-row user-node">Ayush: "${textPayload}"</div><div class="terminal-row luna-node">Luna: "${cleanReplyText}"</div>`;
                interactionHistory.push({ role: "assistant", content: cleanReplyText });
                commitCacheToMemory();

                projectVocalMatrix(cleanReplyText);

            } catch (err) {
                displayDeck.innerHTML += `<div style="color: #ff2a6d; font-size:12px;">[CRITICAL LINK FAULT]: Sync Pipeline Interrupted.</div>`;
                restoreOrbDefault();
            }
        }

        // 🎙️ AUTOMATED MOTHER TONGUE MULTI-VOICE DECODER
        function projectVocalMatrix(outputString) {
            speechSynthesizer.cancel();
            
            lunaOrbCore.className = "jarvis-orb speaking";
            orbLabel.innerText = "SPEAKING";

            const voiceWaveform = new SpeechSynthesisUtterance(outputString);
            const structuralVoicePacks = speechSynthesizer.getVoices();

            // Native Voice Detection Matrix (Picks English Premium or Hindi Neural naturally)
            let matchingVoicePack = structuralVoicePacks.find(voice => 
                voice.name.includes('Google hi-IN') || 
                voice.lang.startsWith('hi-') ||
                voice.name.includes('Google US English') || 
                voice.name.includes('en-US-Neural2') ||
                voice.name.includes('Samantha')
            );

            if (!matchingVoicePack) {
                matchingVoicePack = structuralVoicePacks.find(voice => voice.lang.startsWith('en-'));
            }

            if (matchingVoicePack) voiceWaveform.voice = matchingVoicePack;

            voiceWaveform.rate = 1.02;
            voiceWaveform.pitch = 1.0; 

            voiceWaveform.onend = () => { restoreOrbDefault(); };
            voiceWaveform.onerror = () => { restoreOrbDefault(); };

            speechSynthesizer.speak(voiceWaveform);
        }

        function restoreOrbDefault() { lunaOrbCore.className = "jarvis-orb"; orbLabel.innerText = "READY"; }
        function commitCacheToMemory() { localStorage.setItem('luna_v40_cache', JSON.stringify(interactionHistory)); }
        function refreshLogPanel() {
            logStream.innerHTML = interactionHistory.length === 0 
                ? `<div style="color:rgba(0,243,255,0.2); text-align:center; padding-top:30px; font-size:12px;">No sector fragments logged.</div>`
                : interactionHistory.map(msg => {
                    const nodeLabel = msg.role === 'user' ? 'AYUSH' : 'LUNA';
                    return `<div class="log-card ${msg.role === 'user' ? 'log-user' : 'log-luna'}"><strong>[${nodeLabel}]:</strong> ${msg.content}</div>`;
                  }).join('');
            logStream.scrollTop = logStream.scrollHeight;
        }

        purgeCacheBtn.addEventListener('click', () => {
            if(confirm("Purge memory cores? This cannot be undone.")) { interactionHistory = []; localStorage.removeItem('luna_v40_cache'); refreshLogPanel(); memoryDrawer.classList.remove('open'); }
        });
    </script>
</body>
</html>
