<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luna UI Core</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #01060f;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #52b3d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            overflow-y: auto;
        }
        .sys-header {
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(1, 10, 25, 0.8);
            padding: 12px;
            margin-bottom: 16px;
            font-size: 11px;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00f3ff;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #00f3ff;
            animation: pulse 2s infinite;
        }
        .core-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            margin-bottom: 16px;
        }
        .matrix-ring {
            width: 160px;
            height: 160px;
            border: 2px dashed #00f3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.1), 0 0 20px rgba(0, 243, 255, 0.1);
            animation: rotate 20s linear infinite;
        }
        .ring-text {
            font-weight: bold;
            letter-spacing: 4px;
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            transform: rotate(-90deg);
            animation: unrotate 20s linear infinite;
        }
        .display-panel {
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(1, 10, 25, 0.8);
            padding: 16px;
            min-height: 80px;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 16px;
            border-radius: 2px;
        }
        .deck-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }
        .control-deck {
            display: flex;
            width: 100%;
            border: 1px solid rgba(0, 243, 255, 0.3);
            background: #020b18;
        }
        .matrix-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .transfuse-btn {
            background: #257b9d;
            border: none;
            color: #01060f;
            padding: 0 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .transfuse-btn:active {
            background: #00f3ff;
        }
        .matrix-link-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #52b3d9;
            color: #52b3d9;
            padding: 12px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .matrix-link-btn.active {
            background: rgba(0, 243, 255, 0.1);
            border-color: #00f3ff;
            color: #00f3ff;
            text-shadow: 0 0 8px #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes unrotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sys-header">
        <div>LUNA STARDUST CORE V6.5</div>
        <div><span class="status-dot"></span> NEBULA_STABLE</div>
    </div>

    <div class="core-container">
        <div class="matrix-ring">
            <div class="ring-text" id="statusRing">READY</div>
        </div>
    </div>

    <div class="display-panel" id="consoleOutput">
        Luna System Online. Connection paths stabilized. Ready for core transmission injection.
    </div>

    <div class="deck-wrapper">
        <div class="control-deck">
            <input type="text" id="keyboardInput" class="matrix-input" placeholder="Inject cloud parameter..." autocomplete="off">
            <button id="sendTextBtn" class="transfuse-btn">TRANSFUSE</button>
        </div>

        <button id="audioMatrixBtn" class="matrix-link-btn">CONNECT AUDIO MATRIX LINK</button>
    </div>

    <script>
        const audioMatrixBtn = document.getElementById('audioMatrixBtn');
        const sendTextBtn = document.getElementById('sendTextBtn');
        const keyboardInput = document.getElementById('keyboardInput');
        const consoleOutput = document.getElementById('consoleOutput');
        const statusRing = document.getElementById('statusRing');

        let audioCtx = null;

        audioMatrixBtn.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            audioMatrixBtn.classList.add('active');
            audioMatrixBtn.innerText = "AUDIO MATRIX LINK ACTIVE";
            consoleOutput.innerText = "Hardware audio permissions acquired. Ready to stream.";
        });

        async function transmitDirective() {
            const text = keyboardInput.value.trim();
            if (!text) return;

            if (!audioCtx || audioCtx.state === 'suspended') {
                consoleOutput.innerText = "ERROR: Audio link must be activated before transfusion.";
                return;
            }

            keyboardInput.value = '';
            consoleOutput.innerText = "Processing directive...";
            statusRing.innerText = "THINKING";

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) throw new Error("Transmission interrupted");

                statusRing.innerText = "SPEAKING";
                
                const data = await response.json();
                consoleOutput.innerText = "Luna: " + data.response;

                const audioBytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
                
                audioCtx.decodeAudioData(audioBytes.buffer, (buffer) => {
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);
                    source.start(0);
                    source.onended = () => {
                        statusRing.innerText = "READY";
                    };
                }, (err) => {
                    console.log("Decoding error:", err);
                    statusRing.innerText = "READY";
                });

            } catch (error) {
                consoleOutput.innerText = "CRITICAL FAULT: Connection vector dropped.";
                statusRing.innerText = "ERROR";
            }
        }

        sendTextBtn.addEventListener('click', transmitDirective);
        keyboardInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') transmitDirective();
        });
    </script>
</body>
</html>
