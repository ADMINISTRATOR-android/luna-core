<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luna UI Core</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #01060f;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #52b3d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            overflow-y: auto;
        }
        .sys-header {
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(1, 10, 25, 0.8);
            padding: 12px;
            margin-bottom: 16px;
            font-size: 11px;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00f3ff;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #00f3ff;
        }
        .core-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            margin-bottom: 16px;
        }
        .matrix-ring {
            width: 170px;
            height: 170px;
            border: 2px dashed #00f3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.1), 0 0 20px rgba(0, 243, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: rotate 25s linear infinite;
        }
        .matrix-ring.listening {
            border-color: #bd93f9;
            box-shadow: inset 0 0 30px rgba(189, 147, 249, 0.4), 0 0 30px rgba(189, 147, 249, 0.4);
            animation: rotate 5s linear infinite, pulse 1.5s infinite alternate;
        }
        .ring-text {
            font-weight: bold;
            letter-spacing: 3px;
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            transform: rotate(-90deg);
            animation: unrotate 25s linear infinite;
            pointer-events: none;
        }
        .matrix-ring.listening .ring-text {
            color: #bd93f9;
            text-shadow: 0 0 10px rgba(189, 147, 249, 0.8);
            animation: unrotate 5s linear infinite;
        }
        .display-panel {
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(1, 10, 25, 0.8);
            padding: 16px;
            min-height: 90px;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 16px;
            border-radius: 2px;
            color: #7be5ff;
        }
        .deck-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }
        .control-deck {
            display: flex;
            width: 100%;
            border: 1px solid rgba(0, 243, 255, 0.3);
            background: #020b18;
        }
        .matrix-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .transfuse-btn {
            background: #257b9d;
            border: none;
            color: #01060f;
            padding: 0 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .matrix-link-btn {
            width: 100%;
            background: transparent;
            border: 1px dashed rgba(82, 179, 217, 0.4);
            color: #52b3d9;
            padding: 12px;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-align: center;
        }
        .matrix-link-btn.active {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid #00f3ff;
            color: #00f3ff;
            text-shadow: 0 0 8px #00f3ff;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes unrotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.04); } }
    </style>
</head>
<body>

    <div class="sys-header">
        <div>LUNA STARDUST CORE V6.5</div>
        <div><span class="status-dot"></span> NEBULA_STABLE</div>
    </div>

    <div class="core-container">
        <div id="ringButton" class="matrix-ring">
            <div class="ring-text" id="statusRing">READY</div>
        </div>
    </div>

    <div class="display-panel" id="consoleOutput">
        Luna System Online. Tap the Audio Matrix button below first, then tap the Center Ring to speak, or use the keyboard.
    </div>

    <div class="deck-wrapper">
        <div class="control-deck">
            <input type="text" id="keyboardInput" class="matrix-input" placeholder="Inject cloud parameter..." autocomplete="off">
            <button id="sendTextBtn" class="transfuse-btn">TRANSFUSE</button>
        </div>

        <button id="audioMatrixBtn" class="matrix-link-btn">CONNECT AUDIO MATRIX LINK</button>
    </div>

    <script>
        const audioMatrixBtn = document.getElementById('audioMatrixBtn');
        const ringButton = document.getElementById('ringButton');
        const sendTextBtn = document.getElementById('sendTextBtn');
        const keyboardInput = document.getElementById('keyboardInput');
        const consoleOutput = document.getElementById('consoleOutput');
        const statusRing = document.getElementById('statusRing');

        let audioUnlocked = false;
        let recognition = null;

        // Initialize Speech Recognition API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                ringButton.classList.add('listening');
                statusRing.innerText = "LISTENING";
                consoleOutput.innerText = "Listening to your voice command...";
            };

            recognition.onerror = (e) => {
                console.error(e);
                ringButton.classList.remove('listening');
                statusRing.innerText = "READY";
                consoleOutput.innerText = "Voice matching timed out or rejected.";
            };

            recognition.onresult = (event) => {
                ringButton.classList.remove('listening');
                const voiceText = event.results[0][0].transcript;
                consoleOutput.innerText = `Captured: "${voiceText}"`;
                transmitDirective(voiceText);
            };
        }

        // Arm Audio System
        audioMatrixBtn.addEventListener('click', () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                audioUnlocked = true;
                audioMatrixBtn.classList.add('active');
                audioMatrixBtn.innerText = "AUDIO MATRIX LINK ACTIVE";
                consoleOutput.innerText = "System arming sequence complete. Center ring microphone initialized.";
            }
        });

        // Trigger Speech Recognition on Center Ring Tap
        ringButton.addEventListener('click', () => {
            if (!audioUnlocked) {
                consoleOutput.innerText = "ERROR: You must click 'CONNECT AUDIO MATRIX LINK' first!";
                return;
            }
            if (statusRing.innerText === "THINKING" || statusRing.innerText === "SPEAKING") return;
            
            if (recognition) {
                if (ringButton.classList.contains('listening')) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            } else {
                consoleOutput.innerText = "Speech recognition matrix not supported on this specific device browser.";
            }
        });

        // Core Communication Execution Link
        async function transmitDirective(forcedText = null) {
            const userText = forcedText ? forcedText.trim() : keyboardInput.value.trim();
            if (!userText) return;

            if (!forcedText) keyboardInput.value = ""; 

            statusRing.innerText = "THINKING";
            consoleOutput.innerText = "Processing vector data via Groq...";

            try {
                const chatResponse = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: "user", content: userText }] })
                });
                
                const chatData = await chatResponse.json();
                if (!chatResponse.ok) throw new Error(chatData.error || `HTTP ${chatResponse.status}`);
                
                const lunaReply = chatData.luna_text || chatData.choices[0].message.content;
                consoleOutput.innerText = "Luna: " + lunaReply;
                statusRing.innerText = "SPEAKING";

                const audioResponse = await fetch('/tts/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: lunaReply })
                });

                if (!audioResponse.ok) {
                    const audioErrData = await audioResponse.json().catch(() => ({}));
                    throw new Error(audioErrData.error || "Cartesia audio engine dropped validation.");
                }

                const audioBlob = await audioResponse.blob();
                const matrixAudioPlayer = new Audio(URL.createObjectURL(audioBlob));
                
                matrixAudioPlayer.onended = () => { 
                    statusRing.innerText = "READY"; 
                };
                
                await matrixAudioPlayer.play();

            } catch (matrixException) {
                console.error(matrixException);
                consoleOutput.innerText = "SYSTEM FAULT: " + matrixException.message;
                statusRing.innerText = "ERROR";
            }
        }

        // Keyboard Action Link
        sendTextBtn.addEventListener('click', () => transmitDirective());
        keyboardInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') transmitDirective();
        });
    </script>
</body>
</html>
