<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA UI | QUANTUM CORE</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --matrix-dark: #020b14;
            --panel-bg: rgba(6, 26, 44, 0.45);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--matrix-dark); color: var(--neon-blue);
            font-family: 'Courier New', monospace; height: 100vh;
            display: grid; grid-template-rows: auto 1fr auto; overflow: hidden;
        }

        /* Ambient Grid */
        body::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 1;
        }

        header { padding: 15px; text-align: center; font-size: 11px; letter-spacing: 4px; border-bottom: 1px solid rgba(0,243,255,0.2); z-index: 5; }

        /* The Swarm Stage */
        .stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 2; }
        #swarmCanvas { position: absolute; inset: 0; }
        
        .jarvis-orb {
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid var(--neon-blue); display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #02182b, #052a45);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3); z-index: 10; cursor: pointer;
            transition: transform 0.3s;
        }
        .jarvis-orb:active { transform: scale(0.95); }

        footer { padding: 15px; border-top: 1px solid rgba(0, 243, 255, 0.2); background: var(--panel-bg); z-index: 5; }
        .terminal { font-size: 12px; margin-bottom: 10px; padding: 5px; color: #fff; }
    </style>
</head>
<body>

    <header>LUNA_QUANTUM_CORE_V4</header>

    <div class="stage">
        <canvas id="swarmCanvas"></canvas>
        <div class="jarvis-orb" id="orb">STABLE</div>
    </div>

    <footer>
        <div class="terminal" id="displayPanel">Luna: System ready.</div>
    </footer>

    <script>
        const canvas = document.getElementById('swarmCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- 1. Quantum Swarm Logic ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const dots = Array.from({ length: 100 }, () => ({
            angle: Math.random() * Math.PI * 2,
            speed: (Math.random() - 0.5) * 0.04,
            radius: 100 + Math.random() * 100
        }));

        function draw() {
            ctx.fillStyle = 'rgba(2, 11, 20, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2, centerY = canvas.height / 2;

            dots.forEach(dot => {
                dot.angle += dot.speed;
                const x = centerX + Math.cos(dot.angle) * dot.radius;
                const y = centerY + Math.sin(dot.angle) * dot.radius;
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = varColor('--neon-blue');
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        function varColor(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
        draw();

        // --- 2. Keep your existing logic for SpeechRecognition/Synthesis here ---
        // Your existing handleKeyboardTransmission and executeNeuralVoiceSpeaker logic 
        // will integrate perfectly within this new structural grid.
    </script>
</body>
</html>
