<script>
    async function lunaTransfuse() {
        const inputField = document.getElementById('keyboardInput');
        const userText = inputField.value;
        const orb = document.getElementById('jarvisOrb');
        const orbText = document.getElementById('orbStateText');
        const display = document.getElementById('displayPanel');
        
        if (!userText) return;

        orb.className = "jarvis-orb speaking";
        orbText.innerText = "THINKING...";
        inputField.value = ""; // Clear input immediately

        try {
            // 1. Send to Groq
            const chatRes = await fetch('/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: userText }]
                })
            });
            const chatData = await chatRes.json();
            const lunaReply = chatData.luna_text;
            display.innerText = "Luna: " + lunaReply;

            // 2. Send to Piper
            const audioRes = await fetch('/tts/synthesize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: lunaReply })
            });

            const audioBlob = await audioRes.blob();
            const player = new Audio(URL.createObjectURL(audioBlob));
            
            player.onended = () => { 
                orb.className = "jarvis-orb"; 
                orbText.innerText = "TAP TO TALK"; 
            };
            player.play();
        } catch (err) {
            display.innerText = "SYSTEM ERROR: " + err.message;
            orb.className = "jarvis-orb";
            orbText.innerText = "TAP TO TALK";
        }
    }

    // CLICK HANDLER
    document.getElementById('sendTextBtn').addEventListener('click', lunaTransfuse);

    // KEYBOARD HANDLER (Press Enter to Send)
    document.getElementById('keyboardInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') lunaTransfuse();
    });
</script>
