<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA — DECK MULTI-MATRIX V7.6</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-glow: rgba(0, 243, 255, 0.4);
            --matrix-dark: #020813;
            --panel-bg: rgba(2, 16, 29, 0.65);
            --border-glow: rgba(0, 243, 255, 0.12);
            --neon-pink: #ff2a6d;
            --neon-green: #05ff9e;
            --grid-color: rgba(0, 243, 255, 0.02);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--matrix-dark);
            color: #70b9d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 10px;
            position: relative;
        }

        /* Ambient Technical Grid Backdrop */
        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 25px 25px; z-index: 1; pointer-events: none;
        }

        /* Top HUD Status Banner */
        .hud-header {
            width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            border: 1px solid var(--border-glow); background: var(--panel-bg); backdrop-filter: blur(10px);
            padding: 8px 12px; font-size: 10px; letter-spacing: 2px; z-index: 10;
        }
        .sys-title { font-weight: bold; color: var(--neon-blue); text-shadow: 0 0 6px var(--neon-glow); }
        .sys-status { text-align: center; color: var(--neon-blue); display: flex; align-items: center; gap: 6px; justify-content: center; }
        .pulse-dot { width: 4px; height: 4px; background: var(--neon-blue); border-radius: 50%; animation: blink 1.2s infinite; }
        .history-trigger { text-align: right; color: #70b9d9; cursor: pointer; font-weight: bold; }

        /* Central Hologram Stage Frame */
        .hud-container {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; width: 100%; z-index: 2;
        }

        /* WIDE QUANTUM FIELD STAGE */
        .quantum-canvas-frame {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 380px;
        }

        #particleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* Center Circle "STABLE" Indicator Core */
        .jarvis-orb {
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle, rgba(2,10,22,0.98) 0%, rgba(1,5,12,1) 85%);
            border: 2px solid rgba(0, 243, 255, 0.5);
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.25), inset 0 0 15px rgba(0, 243, 255, 0.2);
            transition: all 0.4s ease; cursor: pointer; z-index: 10;
        }

        .jarvis-orb::before {
            content: ''; position: absolute; width: 90px; height: 90px; border-radius: 50%;
            border: 1px dashed rgba(0, 243, 255, 0.25);
            animation: coreSpin 30s linear infinite;
        }

        #orbLabel { font-size: 10px; font-weight: bold; letter-spacing: 2.5px; color: var(--neon-blue); z-index: 15; text-shadow: 0 0 5px var(--neon-blue); pointer-events: none; }

        /* Reactive Structural State Shifts */
        .jarvis-orb.listening { border-color: var(--neon-green); box-shadow: 0 0 40px rgba(5, 255, 158, 0.35); }
        .jarvis-orb.thinking { border-color: #ffaa00; animation: coreJitter 0.15s infinite; }
        .jarvis-orb.speaking { border-color: var(--neon-pink); box-shadow: 0 0 40px rgba(255, 42, 109, 0.35); }

        /* Tactical Terminal Console Display Deck */
        .display-deck {
            width: 100%; background: var(--panel-bg); border: 1px solid var(--border-glow); border-radius: 4px;
            padding: 12px; min-height: 95px; max-height: 125px; overflow-y: auto; backdrop-filter: blur(10px);
            margin-bottom: 12px; box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.05); z-index: 10;
        }
        .terminal-row { font-size: 12px; line-height: 1.5; text-align: center; }
        .user-node { color: #ffffff; opacity: 0.9; }
        .luna-node { color: var(--neon-blue); font-weight: bold; text-shadow: 0 0 6px rgba(0,243,255,0.3); }

        /* Controls Input Deck */
        .hud-footer { width: 100%; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .input-bar-container {
            display: flex; width: 100%; background: rgba(1, 8, 15, 0.9);
            border: 1px solid rgba(0, 243, 255, 0.25); border-radius: 4px; overflow: hidden;
        }
        .input-bar-container:focus-within { border-color: var(--neon-blue); box-shadow: 0 0 12px rgba(0, 243, 255, 0.2); }
        .matrix-input { flex: 1; background: transparent; border: none; outline: none; color: #ffffff; padding: 12px; font-family: inherit; font-size: 13px; }
        .matrix-send-btn { background: rgba(0, 243, 255, 0.06); border: none; border-left: 1px solid rgba(0, 243, 255, 0.25); color: var(--neon-blue); padding: 0 20px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 11px; }
        .coupling-btn { background: transparent; border: 1px dashed rgba(0, 243, 255, 0.3); color: var(--neon-blue); padding: 10px; font-size: 10px; font-family: inherit; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; cursor: pointer; text-align: center; }

        /* Sliding Data Log Drawer Overlay */
        .memory-drawer {
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: rgba(1, 6, 12, 0.99); border-right: 1px solid var(--neon-blue);
            z-index: 25; transition: left 0.4s cubic-bezier(0.075, 0.82, 0.165, 1);
            padding: 20px; display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }
        .memory-drawer.open { left: 0; }
        .drawer-hud { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 243, 255, 0.2); padding-bottom: 12px; margin-bottom: 15px; }
        .drawer-title { font-weight: bold; letter-spacing: 1px; color: var(--neon-blue); font-size: 12px; }
        .drawer-close { color: var(--neon-pink); cursor: pointer; font-size: 11px; }
        .log-stream { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .log-card { font-size: 11px; padding: 10px; border-radius: 4px; background: rgba(255,255,255,0.01); border: 1px solid rgba(0, 243, 255, 0.05); }
        .log-user { border-left: 2px solid #ffffff; color: #ffffff; }
        .log-luna { border-left: 2px solid var(--neon-blue); color: var(--neon-blue); }
        .purge-btn { background: transparent; border: 1px dashed #ff2a6d; color: #ff2a6d; padding: 10px; font-family: inherit; font-size: 10px; border-radius: 4px; cursor: pointer; margin-top: 12px; }

        @keyframes coreSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes coreJitter {
            0% { transform: translate(0.5px, 0.5px); }
            50% { transform: translate(-0.5px, -0.5px); }
            100% { transform: translate(0px, 0.5px); }
        }
    </style>
</head>
<body>

    <div class="hud-header">
        <div class="sys-title">LUNA STARDUST CORE V7.6</div>
        <div class="sys-status"><div class="pulse-dot"></div>NEBULA_STABLE</div>
        <div class="history-trigger" id="openLogBtn">// SYS_MEMORY_LOGS</div>
    </div>

    <div id="memoryDrawer" class="memory-drawer">
        <div class="drawer-hud">
            <span class="drawer-title">STARDUST_DECK_CACHE.LOG</span>
            <span class="drawer-close" id="closeLogBtn">[TERMINATE]</span>
        </div>
        <div id="logStream" class="log-stream"></div>
        <button id="purgeCacheBtn" class="purge-btn">FLUSH PERSISTENT CACHE</button>
    </div>

    <div class="hud-container">
        <div class="quantum-canvas-frame" id="canvasFrame">
            <canvas id="particleCanvas"></canvas>
            
            <div id="lunaOrbCore" class="jarvis-orb">
                <span id="orbLabel">STABLE</span>
            </div>
        </div>
    </div>

    <div id="displayDeck" class="display-deck">
        <div class="terminal-row luna-node">Luna: "Particle ring grid initialized. Multi-axis dust layers active."</div>
    </div>

    <div class="hud-footer">
        <div class="input-bar-container">
            <input type="text" id="matrixInput" class="matrix-input" placeholder="Inject cloud parameter commands..." autocomplete="off">
            <button id="sendBtn" class="matrix-send-btn">TRANSFUSE</button>
        </div>
        <button id="micBtn" class="coupling-btn">CONNECT AUDIO MATRIX LINK</button>
    </div>

    <script>
        const RENDER_BACKEND_URL = "/v1/chat/completions";
        const speechSynthesizer = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let speechRecognizer = SpeechRecognition ? new SpeechRecognition() : null;
        
        if(speechRecognizer) { speechRecognizer.continuous = false; speechRecognizer.interimResults = false; speechRecognizer.lang = 'en-US'; }

        const lunaOrbCore = document.getElementById('lunaOrbCore');
        const orbLabel = document.getElementById('orbLabel');
        const displayDeck = document.getElementById('displayDeck');
        const micBtn = document.getElementById('micBtn');
        const matrixInput = document.getElementById('matrixInput');
        const sendBtn = document.getElementById('sendBtn');
        const memoryDrawer = document.getElementById('memoryDrawer');
        const openLogBtn = document.getElementById('openLogBtn');
        const logStream = document.getElementById('logStream');
        const purgeCacheBtn = document.getElementById('purgeCacheBtn');

        // Canvas Setup Configuration
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const canvasFrame = document.getElementById('canvasFrame');
        
        function adaptCanvasBoundaries() {
            canvas.width = canvasFrame.clientWidth;
            canvas.height = canvasFrame.clientHeight;
        }
        adaptCanvasBoundaries();
        window.addEventListener('resize', adaptCanvasBoundaries);

        let interactionHistory = JSON.parse(localStorage.getItem('luna_v76_cache')) || [];
        refreshLogPanel();

        // 🌌 FIXED MULTI-AXIS PARTICLE ENGINE
        const totalParticlesCount = 1500; 
        const particleArray = [];
        let timeOffset = 0;

        const discretePlanes = [
            { tiltAngle: Math.PI / 4,    speed: 0.005,  dir: 1,  radiusX: 130, radiusY: 45 },  
            { tiltAngle: -Math.PI / 4,   speed: 0.004,  dir: -1, radiusX: 140, radiusY: 50 },  
            { tiltAngle: Math.PI / 2,    speed: 0.003,  dir: 1,  radiusX: 125, radiusY: 40 },  
            { tiltAngle: Math.PI / 25,   speed: 0.002,  dir: -1, radiusX: 150, radiusY: 55 }   
        ];

        class RingDustParticle {
            constructor() {
                this.track = discretePlanes[Math.floor(Math.random() * discretePlanes.length)];
                this.anglePosition = Math.random() * Math.PI * 2;
                this.radiusDeviationX = (Math.random() - 0.5) * 15;
                this.radiusDeviationY = (Math.random() - 0.5) * 10;
                this.particleSize = 0.5 + Math.random() * 1.2;
                this.alpha = 0.2 + Math.random() * 0.65;
            }

            renderUpdate() {
                this.anglePosition += this.track.speed * this.track.dir;
                let waveNoise = Math.sin(this.anglePosition * 4 + timeOffset) * 4;

                let localX = Math.cos(this.anglePosition) * (this.track.radiusX + this.radiusDeviationX + waveNoise);
                let localY = Math.sin(this.anglePosition) * (this.track.radiusY + this.radiusDeviationY + waveNoise);

                let spaceX = localX * Math.cos(this.track.tiltAngle) - localY * Math.sin(this.track.tiltAngle);
                let spaceY = localX * Math.sin(this.track.tiltAngle) + localY * Math.cos(this.track.tiltAngle);

                let drawTargetX = (canvas.width / 2) + spaceX;
                let drawTargetY = (canvas.height / 2) + spaceY;

                let activeColor = `rgba(0, 243, 255, ${this.alpha})`; 
                if (lunaOrbCore.classList.contains('listening')) {
                    activeColor = `rgba(5, 255, 158, ${this.alpha})`; 
                } else if (lunaOrbCore.classList.contains('speaking')) {
                    activeColor = `rgba(255, 42, 109, ${this.alpha})`; 
                } else if (lunaOrbCore.classList.contains('thinking')) {
                    activeColor = `rgba(255, 170, 0, ${this.alpha})`; 
                }

                ctx.beginPath();
                ctx.arc(drawTargetX, drawTargetY, this.particleSize, 0, Math.PI * 2);
                ctx.fillStyle = activeColor;
                ctx.fill();
            }
        }

        for (let i = 0; i < totalParticlesCount; i++) {
            particleArray.push(new RingDustParticle());
        }

        function runGlobalParticleMatrix() {
            ctx.fillStyle = 'rgba(2, 8, 19, 0.25)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            timeOffset += 0.02; 
            
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].renderUpdate();
            }
            requestAnimationFrame(runGlobalParticleMatrix);
        }
        runGlobalParticleMatrix();


        // APPLICATION INTELLIGENCE PIPELINE
        openLogBtn.addEventListener('click', () => { refreshLogPanel(); memoryDrawer.classList.add('open'); });
        document.getElementById('closeLogBtn').addEventListener('click', () => memoryDrawer.classList.remove('open'));
        sendBtn.addEventListener('click', processTextTransmission);
        matrixInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') processTextTransmission(); });

        async function processTextTransmission() {
            const currentString = matrixInput.value.trim();
            if(!currentString) return;
            matrixInput.value = "";
            displayDeck.innerHTML = `<div class="terminal-row user-node">Ayush: "${currentString}"</div>`;
            interactionHistory.push({ role: "user", content: currentString });
            commitCacheToMemory();
            await broadcastToLunaMatrix(currentString);
        }

        const triggerMicCoupling = () => { if (!speechRecognizer) { alert("Audio module link offline."); return; } speechSynthesizer.cancel(); speechRecognizer.start(); };
        lunaOrbCore.addEventListener('click', triggerMicCoupling);
        micBtn.addEventListener('click', triggerMicCoupling);

        if(speechRecognizer) {
            speechRecognizer.onstart = () => { lunaOrbCore.className = "jarvis-orb listening"; orbLabel.innerText = "CAPTURING"; };
            speechRecognizer.onresult = async (event) => {
                const speechResultText = event.results[0][0].transcript;
                displayDeck.innerHTML = `<div class="terminal-row user-node">Ayush: "${speechResultText}"</div>`;
                interactionHistory.push({ role: "user", content: speechResultText });
                commitCacheToMemory();
                await broadcastToLunaMatrix(speechResultText);
            };
            speechRecognizer.onend = () => { if (!lunaOrbCore.classList.contains('speaking')) restoreOrbDefault(); };
        }

        async function broadcastToLunaMatrix(textPayload) {
            lunaOrbCore.className = "jarvis-orb thinking";
            orbLabel.innerText = "PROCESSING";
            try {
                const condensedContext = interactionHistory.slice(-20).map(msg => ({ role: msg.role, content: msg.content }));
                const matrixResponse = await fetch(RENDER_BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "luna-genesis-v5", messages: condensedContext, stream: false })
                });

                const dataPackage = await matrixResponse.json();
                const cleanReplyText = dataPackage.choices && dataPackage.choices[0] && dataPackage.choices[0].message
                    ? dataPackage.choices[0].message.content 
                    : (dataPackage.luna_text || "[UNSTABLE SYSTEM DATAFEED]");

                displayDeck.innerHTML = `<div class="terminal-row user-node">Ayush: "${textPayload}"</div><div class="terminal-row luna-node">Luna: "${cleanReplyText}"</div>`;
                interactionHistory.push({ role: "assistant", content: cleanReplyText });
                commitCacheToMemory();

                projectVocalMatrix(cleanReplyText);
            } catch (err) {
                displayDeck.innerHTML += `<div style="color: #ff2a6d; font-size:11px;">[QUANTUM_DECOHERENCE_FAULT]</div>`;
                restoreOrbDefault();
            }
        }

        function projectVocalMatrix(outputString) {
            speechSynthesizer.cancel();
            lunaOrbCore.className = "jarvis-orb speaking";
            orbLabel.innerText = "EMITTING";

            const voiceWaveform = new SpeechSynthesisUtterance(outputString);
            const structuralVoicePacks = speechSynthesizer.getVoices();

            let matchingVoicePack = structuralVoicePacks.find(voice => 
                voice.name.includes('Google hi-IN') || voice.lang.startsWith('hi-') ||
                voice.name.includes('Google US English') || voice.name.includes('en-US-Neural2') || voice.name.includes('Samantha')
            );

            if (!matchingVoicePack) { matchingVoicePack = structuralVoicePacks.find(voice => voice.lang.startsWith('en-')); }
            if (matchingVoicePack) voiceWaveform.voice = matchingVoicePack;

            voiceWaveform.rate = 1.02;
            voiceWaveform.pitch = 1.0; 
            voiceWaveform.onend = () => { restoreOrbDefault(); };
            voiceWaveform.onerror = () => { restoreOrbDefault(); };

            speechSynthesizer.speak(voiceWaveform);
        }

        function restoreOrbDefault() { lunaOrbCore.className = "jarvis-orb"; orbLabel.innerText = "STABLE"; }
        function commitCacheToMemory() { localStorage.setItem('luna_v76_cache', JSON.stringify(interactionHistory)); }
        function refreshLogPanel() {
            logStream.innerHTML = interactionHistory.length === 0 
                ? `<div style="color:rgba(0,243,255,0.15); text-align:center; padding-top:30px; font-size:11px;">LOG SHUTTER EMPTY.</div>`
                : interactionHistory.map(msg => {
                    const nodeLabel = msg.role === 'user' ? 'AYUSH' : 'LUNA';
                    return `<div class="log-card ${msg.role === 'user' ? 'log-user' : 'log-luna'}"><strong>[${nodeLabel}]:</strong> ${msg.content}</div>`;
                  }).join('');
            logStream.scrollTop = logStream.scrollHeight;
        }

        purgeCacheBtn.addEventListener('click', () => {
            if(confirm("Flush atomic logs?")) { interactionHistory = []; localSt
