<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA — JARVIS CORE V3.3</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/kokoro-js@latest/dist/index.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #02080d; color: #52b3d9; font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 100vh; overflow: hidden; padding: 20px; position: relative;
        }
        
        #swarmCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .header { width: 100%; display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 2px; border-bottom: 1px solid rgba(82, 179, 217, 0.2); padding-bottom: 8px; z-index: 5; }
        .history-toggle { color: #52b3d9; cursor: pointer; text-decoration: underline; font-weight: bold; }
        
        .orb-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; z-index: 5; }
        .jarvis-orb {
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, rgba(2,15,26,0.8) 0%, rgba(5,42,69,0.2) 60%);
            border: 2px dashed rgba(82, 179, 217, 0.4); position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(82, 179, 217, 0.15); transition: all 0.3s ease; cursor: pointer;
        }
        .jarvis-orb.listening { border-color: #00ffcc; box-shadow: 0 0 40px rgba(0, 255, 204, 0.5); }
        .jarvis-orb.speaking { border-color: #ff3366; box-shadow: 0 0 40px rgba(255, 51, 102, 0.5); }
        
        .display-panel { width: 100%; max-height: 120px; background: rgba(5, 24, 38, 0.7); border: 1px solid rgba(82, 179, 217, 0.25); border-radius: 6px; padding: 12px; font-size: 13px; overflow-y: auto; text-align: center; margin-bottom: 12px; z-index: 5; }
        .luna-text { color: #00ffcc; font-weight: bold; }
        
        .control-deck { width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: center; z-index: 5; }
        .text-input-container { display: flex; width: 100%; background: rgba(5, 24, 38, 0.8); border: 1px solid rgba(82, 179, 217, 0.4); border-radius: 4px; overflow: hidden; }
        .jarvis-input { flex: 1; background: transparent; border: none; outline: none; color: #ffffff; padding: 12px; font-family: inherit; }
        .send-btn { background: rgba(82, 179, 217, 0.15); border: none; color: #52b3d9; padding: 0 16px; cursor: pointer; font-weight: bold; }
        .voice-trigger-btn { background: transparent; border: 1px dashed #52b3d9; color: #52b3d9; padding: 12px; font-size: 12px; border-radius: 4px; cursor: pointer; width: 100%; }
        
        .history-drawer { position: absolute; top: 0; left: -100%; width: 90%; height: 100%; background: rgba(2, 10, 18, 0.98); border-right: 2px solid #52b3d9; z-index: 20; transition: left 0.3s ease; padding: 20px; display: flex; flex-direction: column; }
        .history-drawer.open { left: 0; }
    </style>
</head>
<body>

    <canvas id="swarmCanvas"></canvas>

    <div class="header">
        <div>SYS: LUNA CORE V3.3</div>
        <div class="history-toggle" id="openHistoryBtn">📝 CHAT LOGS</div>
    </div>

    <div id="historyDrawer" class="history-drawer">
        <div class="drawer-header"><span class="drawer-title">CORE_MEMORY_LOGS</span><span id="closeHistoryBtn" style="cursor:pointer; color:#ff3366;">[DISENGAGE]</span></div>
        <div id="historyLogContainer" style="flex:1; overflow-y:auto;"></div>
        <button id="wipeMemoryBtn" style="background:transparent; border:1px solid #ff3366; color:#ff3366; padding:10px; cursor:pointer;">WIPE ARCHIVE</button>
    </div>

    <div class="orb-container">
        <div id="jarvisOrb" class="jarvis-orb">
            <span id="orbStateText" style="font-size: 10px; letter-spacing: 1px;">LOADING KOKORO...</span>
        </div>
    </div>

    <div id="displayPanel" class="display-panel">
        <div class="luna-text">Vocal systems initializing...</div>
    </div>

    <div class="control-deck">
        <div class="text-input-container">
            <input type="text" id="keyboardInput" class="jarvis-input" placeholder="Transmit directive..." autocomplete="off">
            <button id="sendTextBtn" class="send-btn">SEND</button>
        </div>
        <button id="voiceTalkBtn" class="voice-trigger-btn">ENGAGE MIC COUPLING</button>
    </div>

    <script type="module">
        import { KokoroTTS } from "https://cdn.jsdelivr.net/npm/kokoro-js@latest/dist/index.js";
        
        let tts;
        const orb = document.getElementById('jarvisOrb');
        const orbText = document.getElementById('orbStateText');
        
        // 1. Particle Engine
        const canvas = document.getElementById('swarmCanvas');
        const ctx = canvas.getContext('2d');
        let dots = Array.from({ length: 100 }, () => ({ angle: Math.random() * Math.PI * 2, speed: (Math.random() - 0.5) * 0.02, radius: 150 + Math.random() * 100 }));
        
        function drawSwarm() {
            ctx.fillStyle = 'rgba(2, 8, 13, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = window.innerWidth/2, cy = window.innerHeight/2;
            dots.forEach(d => {
                d.angle += d.speed;
                ctx.fillStyle = '#52b3d9';
                ctx.beginPath();
                ctx.arc(cx + Math.cos(d.angle) * d.radius, cy + Math.sin(d.angle) * d.radius, 1.5, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(drawSwarm);
        }
        drawSwarm();

        // 2. Kokoro Voice Engine
        async function initTTS() {
            tts = await KokoroTTS.from_pretrained("onnx-community/Kokoro-82M-ONNX", { dtype: "q8" });
            orbText.innerText = "TAP TO TALK";
        }
        initTTS();

        async function speak(text) {
            orb.className = "jarvis-orb speaking";
            orbText.innerText = "SPEAKING";
            const audio = await tts.generate(text, { voice: "af_sky" });
            const player = new Audio(URL.createObjectURL(new Blob([audio.data], { type: 'audio/wav' })));
            player.onended = () => { orb.className = "jarvis-orb"; orbText.innerText = "TAP TO TALK"; };
            player.play();
        }

        // 3. Logic Bridge (Connects your existing Input/Send/SpeechRecog logic)
        document.getElementById('sendTextBtn').onclick = async () => {
            const input = document.getElementById('keyboardInput').value;
            // ... Call your LLM here, then:
            // await speak(llmResponse);
        };
    </script>
</body>
</html>
